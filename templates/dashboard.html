<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .topbar {
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .topbar h2 {
      margin: 0;
      font-size: 18px;
    }

    .nav {
      display: flex;
      gap: 10px;
    }

    .nav a {
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      transition: 0.2s;
    }

    .nav a:hover {
      background: rgba(56,189,248,0.2);
      border-color: rgba(56,189,248,0.4);
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 18px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 16px;
      color: #38bdf8;
    }

    label {
      font-size: 13px;
      display: block;
      margin-bottom: 6px;
      color: rgba(255,255,255,0.7);
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.25);
      color: white;
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input:focus, textarea:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 2px rgba(56,189,248,0.25);
    }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .full {
      grid-column: span 2;
    }

    .small {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 5px;
    }

    @media(max-width: 850px){
      .grid {
        grid-template-columns: 1fr;
      }
      .full {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <h2>⚙️ Admin Dashboard</h2>
    <div class="nav">
      <a href="/admin">Dashboard</a>
      <a href="/admin/promos">Promos</a>
      <a href="/admin/banner_buttons">Banner Buttons</a>
      <a href="/admin/users">Users</a>
      <a href="/admin/logout">Logout</a>
    </div>
  </div>

  <div class="container">
    <form method="POST">

      <div class="grid">

        <div class="card full">
          <h3>🖼 Main Banner</h3>
          <label>Banner Image URL</label>
          <input type="text" name="main_banner" value="{{ data.main_banner }}">
          <div class="small">Recommended: Imgur / CDN URL</div>
        </div>

        <div class="card full">
          <h3>👋 Welcome Text</h3>
          <label>Welcome Caption</label>
          <textarea name="welcome_text">{{ data.welcome_text }}</textarea>
          <div class="small">
            Available placeholders: {username} {user_id} {today_count} {month_count}
          </div>
        </div>

        <div class="card">
          <h3>📌 About</h3>
          <label>About Text</label>
          <textarea name="about_text">{{ data.about_text }}</textarea>
        </div>

        <div class="card">
          <h3>🚀 Register URL</h3>
          <label>Register Link</label>
          <input type="text" name="register_url" value="{{ data.register_url }}">
        </div>

        <div class="card">
          <h3>💬 Telegram Support</h3>
          <label>Support Link</label>
          <input type="text" name="telegram_support" value="{{ data.telegram_support }}">
        </div>

        <div class="card">
          <h3>📞 WhatsApp</h3>
          <label>WhatsApp Link</label>
          <input type="text" name="whatsapp_url" value="{{ data.whatsapp_url }}">
        </div>

        <div class="card">
          <h3>📊 Manual Today Add</h3>
          <label>Manual Add Today</label>
          <input type="number" name="manual_today_add" value="{{ data.manual_today_add }}">
        </div>

        <div class="card">
          <h3>📅 Manual Month Add</h3>
          <label>Manual Add Month</label>
          <input type="number" name="manual_month_add" value="{{ data.manual_month_add }}">
        </div>

        <div class="card full">
          <button class="btn" type="submit">💾 Save Settings</button>
        </div>

      </div>

    </form>
  </div>

</body>
</html>
