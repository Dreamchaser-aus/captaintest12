<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .topbar {
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .topbar h2 {
      margin: 0;
      font-size: 18px;
    }

    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav a {
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
    }

    .nav a:hover {
      background: rgba(56,189,248,0.2);
      border-color: rgba(56,189,248,0.4);
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h3 {
      margin: 0 0 12px;
      color: #38bdf8;
      font-size: 16px;
    }

    label {
      font-size: 13px;
      opacity: 0.8;
    }

    input, textarea {
      width: 100%;
      margin-top: 6px;
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.25);
      color: white;
      outline: none;
      box-sizing: border-box;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #0ea5e9;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media(max-width: 800px){
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .upload-box {
      border: 1px dashed rgba(255,255,255,0.3);
      padding: 14px;
      border-radius: 12px;
      margin-top: 10px;
    }

    .hint {
      font-size: 12px;
      opacity: 0.6;
      margin-top: -6px;
      margin-bottom: 10px;
    }

  </style>
</head>

<body>

  <div class="topbar">
    <h2>⚙️ Admin Dashboard</h2>

    <div class="nav">
      <a href="/admin">Dashboard</a>
      <a href="/admin/users">Users</a>
      <a href="/admin/promos">Promos</a>
      <a href="/admin/banner_buttons">Banner Buttons</a>
      <a href="/admin/logout">Logout</a>
    </div>
  </div>

  <div class="container">

    <!-- SETTINGS -->
    <div class="card">
      <h3>⚙️ General Settings</h3>

      <form method="POST">

        <label>Main Banner URL</label>
        <input type="text" name="main_banner" value="{{ data.main_banner }}">

        <label>Welcome Text</label>
        <textarea name="welcome_text">{{ data.welcome_text }}</textarea>

        <label>About Text</label>
        <textarea name="about_text">{{ data.about_text }}</textarea>

        <div class="grid">

          <div>
            <label>Register URL</label>
            <input type="text" name="register_url" value="{{ data.register_url }}">
          </div>

          <div>
            <label>Telegram Support</label>
            <input type="text" name="telegram_support" value="{{ data.telegram_support }}">
          </div>

        </div>

        <label>WhatsApp URL</label>
        <input type="text" name="whatsapp_url" value="{{ data.whatsapp_url }}">

        <div class="grid">

          <div>
            <label>Manual Today Add</label>
            <input type="number" name="manual_today_add" value="{{ data.manual_today_add }}">
          </div>

          <div>
            <label>Manual Month Add</label>
            <input type="number" name="manual_month_add" value="{{ data.manual_month_add }}">
          </div>

        </div>

        <button type="submit">💾 Save Settings</button>
      </form>
    </div>

    <!-- UPLOAD BANNER -->
    <div class="card">
      <h3>📤 Upload Banner (Cloudinary)</h3>

      <div class="hint">
        Upload image → auto store in Cloudinary → replace main banner
      </div>

      <form action="/admin/upload_banner" method="POST" enctype="multipart/form-data">

        <div class="upload-box">
          <input type="file" name="image" required>
        </div>

        <button type="submit" style="margin-top:10px;">Upload Banner</button>

      </form>
    </div>

  </div>

</body>
</html>
