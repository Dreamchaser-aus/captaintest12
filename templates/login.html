<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body { font-family: Arial; background: #0f172a; color: white; }
        .box { width: 400px; margin: 120px auto; padding: 30px; background: #1e293b; border-radius: 10px; }
        input { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: none; }
        button { width: 100%; padding: 12px; margin-top: 15px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .error { color: #ff4d4d; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Admin Login</h2>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required />
            <input type="password" name="password" placeholder="Password" required />
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
